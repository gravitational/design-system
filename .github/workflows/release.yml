name: Release

on:
  push:
    paths:
      - ".changeset/**"
      - ".github/workflows/release.yml"
      - "src/**"
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  NODE_VERSION: 22.x

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5

      - name: Setup pnpm with cache
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'

      - name: Install Playwright Browsers
        run: pnpm exec playwright install

      - name: Test
        run: pnpm test

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Create release PR
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: "Version packages"
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag and retitle the release (pkg@x.y.z -> vX.Y.Z)
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Changeset titles releases and tags as @gravitational/design-system@1.2.3
          # We want to retag it as v1.2.3 and set the release title to 1.2.3

          git fetch origin +refs/tags/*:refs/tags/*

          OLD_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          VERSION="${OLD_TAG##*@}"   # -> "1.2.3"
          NEW_TAG="v${VERSION}"      # -> "v1.2.3"

          git fetch --tags
          COMMIT=$(git rev-list -n 1 "$OLD_TAG")
          git tag -f "$NEW_TAG" "$COMMIT"
          git push -f origin "refs/tags/$NEW_TAG"

          gh release edit "$OLD_TAG" --tag "$NEW_TAG" --title "$VERSION" --verify-tag

          # Delete the old tag (remote + local) so only vX.Y.Z remains
          git push origin ":refs/tags/$OLD_TAG" || true
          git tag -d "$OLD_TAG" || true

          echo "Retagged and retitled release to $NEW_TAG"

      - name: Upload release asset
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          gh release upload "$TAG" dist/design-system.tgz --clobber
          echo "Uploaded dist/design-system.tgz to release $TAG"
