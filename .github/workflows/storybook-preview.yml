name: Storybook Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: 22.x

concurrency:
  group: storybook-deployment
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  issues: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5

      - name: Setup pnpm with cache
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Upload this PR's storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-pr-${{ github.event.pull_request.number }}
          path: ./storybook-static
          retention-days: 90
          overwrite: true

      - name: Ensure main storybook build is available
        uses: ./.github/actions/ensure-main-storybook
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch other open PR previews
        uses: ./.github/actions/fetch-pr-previews
        with:
          exclude-pr: ${{ github.event.pull_request.number }}

      - name: Add this PR's freshly-built storybook to previews
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.pull_request.number }}
          mkdir -p ./pr-previews
          rm -rf "./pr-previews/${PR_NUMBER}"
          mkdir -p "./pr-previews/${PR_NUMBER}"
          cp -r ./storybook-static/. "./pr-previews/${PR_NUMBER}/"
          echo "Staged PR #${PR_NUMBER} preview from this run's build."

      - name: Assemble and deploy combined pages
        uses: ./.github/actions/deploy-combined-pages

      - name: Post deployment comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm bot storybook \
            --owner ${{ github.repository_owner }} \
            --repo ${{ github.event.repository.name }} \
            --pull-number ${{ github.event.pull_request.number }}
