name: Storybook Cleanup

on:
  pull_request:
    types: [closed]

env:
  NODE_VERSION: 22.x

concurrency:
  group: storybook-deployment
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write
  pull-requests: read

jobs:
  cleanup:
    name: Remove PR preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Delete this PR's storybook artifacts
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const artifactName = `storybook-pr-${process.env.PR_NUMBER}`;

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: artifactName,
                per_page: 100,
              }
            );

            if (artifacts.length === 0) {
              core.info(`No artifacts named ${artifactName} found; nothing to delete.`);
              return;
            }

            for (const artifact of artifacts) {
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                core.info(`Deleted artifact ${artifactName} (id ${artifact.id}).`);
              } catch (err) {
                core.warning(`Failed to delete artifact ${artifact.id}: ${err.message}`);
              }
            }

      - name: Ensure main storybook build is available
        uses: ./.github/actions/ensure-main-storybook
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch remaining open PR previews
        uses: ./.github/actions/fetch-pr-previews

      - name: Assemble and deploy combined pages
        uses: ./.github/actions/deploy-combined-pages
