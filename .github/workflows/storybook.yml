name: Storybook

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 24.x

concurrency:
  group: storybook-deployment
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write
  pull-requests: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5

      - name: Setup pnpm with cache
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        run: pnpm build-storybook

      - name: Upload main storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-main
          path: ./storybook-static
          retention-days: 90
          overwrite: true

      - name: Stage main build as the deploy root
        run: |
          set -euo pipefail
          rm -rf ./storybook-static-main
          cp -r ./storybook-static ./storybook-static-main

      - name: Fetch open PR previews
        uses: ./.github/actions/fetch-pr-previews

      - name: Assemble and deploy combined pages
        uses: ./.github/actions/deploy-combined-pages
