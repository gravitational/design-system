name: 'Fetch Main Storybook Artifact'
description: 'Fetches the latest main storybook artifact from the storybook.yml workflow. Sets found=false (without erroring) if no main has ever been deployed; fails the step on download errors so callers do not overwrite Pages with empty content.'
outputs:
  found:
    description: 'Whether a main storybook artifact exists (true/false)'
    value: ${{ steps.get-main-run.outputs.found }}
  run-id:
    description: 'The workflow run ID where the artifact was found'
    value: ${{ steps.get-main-run.outputs.run_id }}
runs:
  using: 'composite'
  steps:
    - name: Locate latest main storybook workflow run
      id: get-main-run
      uses: actions/github-script@v7
      with:
        script: |
          const runs = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: '.github/workflows/storybook.yml',
            branch: 'main',
            status: 'success',
            per_page: 1,
          });

          if (runs.data.workflow_runs.length > 0) {
            const runId = runs.data.workflow_runs[0].id;
            core.info(`Found main storybook run: ${runId}`);
            core.setOutput('run_id', runId);
            core.setOutput('found', 'true');
          } else {
            core.info('No successful main storybook runs found.');
            core.setOutput('found', 'false');
          }

    - name: Download main storybook artifact
      if: steps.get-main-run.outputs.found == 'true'
      uses: actions/download-artifact@v5
      with:
        name: storybook-main
        path: ./storybook-static-main
        github-token: ${{ github.token }}
        repository: ${{ github.repository }}
        run-id: ${{ steps.get-main-run.outputs.run_id }}
