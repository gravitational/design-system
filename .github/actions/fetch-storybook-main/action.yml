name: 'Fetch Main Storybook Artifact'
description: 'Fetches the latest available main storybook artifact from the storybook.yml workflow. Sets found=false (without erroring) when no usable artifact exists — either no main has ever been deployed, or the most recent artifacts have expired or been deleted. Fails the step on download errors so callers do not overwrite Pages with empty content.'
outputs:
  found:
    description: 'Whether a main storybook artifact exists (true/false)'
    value: ${{ steps.get-main-run.outputs.found }}
  run-id:
    description: 'The workflow run ID where the artifact was found'
    value: ${{ steps.get-main-run.outputs.run_id }}
runs:
  using: 'composite'
  steps:
    - name: Locate latest main storybook workflow run with available artifact
      id: get-main-run
      uses: actions/github-script@v7
      with:
        script: |
          const runs = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: '.github/workflows/storybook.yml',
            branch: 'main',
            status: 'success',
            per_page: 30,
          });

          for (const run of runs.data.workflow_runs) {
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });
            const artifact = artifacts.data.artifacts.find(
              a => a.name === 'storybook-main' && !a.expired
            );
            if (artifact) {
              core.info(`Found main storybook artifact in run: ${run.id}`);
              core.setOutput('run_id', run.id);
              core.setOutput('found', 'true');
              return;
            }
          }

          core.info('No available main storybook artifact found.');
          core.setOutput('found', 'false');

    - name: Download main storybook artifact
      if: steps.get-main-run.outputs.found == 'true'
      uses: actions/download-artifact@v5
      with:
        name: storybook-main
        path: ./storybook-static-main
        github-token: ${{ github.token }}
        repository: ${{ github.repository }}
        run-id: ${{ steps.get-main-run.outputs.run_id }}
